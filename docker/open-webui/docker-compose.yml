# Open WebUI + Ollama — Local LLMs (FREE, no API key needed)
# Start: docker compose up -d
# Open:  http://localhost:8080
# After start, pull a model: docker exec ollama ollama pull llama3.2:3b

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU (NVIDIA): uncomment below
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      - ollama

volumes:
  ollama_models:
  open_webui_data:
